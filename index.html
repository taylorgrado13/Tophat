<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Hat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --tray: #F0EFED;
    --border: #dbd7cf;
    --border-light: #e8e5df;
    --text-primary: #2b2825;
    --text-muted: #9a9288;
    --text-light: #b5afa5;
    --hat-light: #52473e;
  }
  html, body {
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
  }
  .widget {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 240px;
    padding: 20px 18px 18px;
    display: flex; flex-direction: column; align-items: center; gap: 13px;
    position: relative;
  }
  .header { display:flex; align-items:center; gap:7px; width:100%; }
  .sparkle { color: var(--text-light); font-size:11px; }
  .title {
    font-family: 'DM Serif Display', serif;
    font-size: 16px; color: var(--text-primary);
    font-weight: 400; letter-spacing: 0.01em;
  }
  .divider { width:100%; height:1px; background:var(--border-light); margin:-3px 0; }

/* ── SCENE ── */
.scene {
position: relative;
width: 204px;
height: 204px;
flex-shrink: 0;
overflow: visible;
}

/* ── HAT ── */
.hat-wrap {
position: absolute;
left: 50%; top: 50%;
transform: translate(-50%, -46%);
z-index: 2;
}
@keyframes hatFloat {
0%,100% { transform: translate(-50%,-46%) translateY(0); }
50%      { transform: translate(-50%,-46%) translateY(-4px); }
}
@keyframes hatTip {
0%,80%,100% { transform: rotate(0deg); }
88%  { transform: rotate(-6deg) translateX(-2px); }
94%  { transform: rotate(2deg); }
}
.hat-wrap { animation: hatFloat 4s ease-in-out infinite; }
.hat-inner { animation: hatTip 7s ease-in-out infinite; transform-origin: bottom center; }

/* Stars */
.hat-star {
position: absolute; left:50%; top:32%;
font-size:9px; pointer-events:none; opacity:0;
animation: starPop var(–d) ease-out var(–delay) infinite;
}
@keyframes starPop {
0%   { opacity:0; transform:translate(var(–sx),0) scale(0.4); }
20%  { opacity:0.6; }
100% { opacity:0; transform:translate(var(–ex),var(–ey)) scale(0.1) rotate(200deg); }
}

/* ── THOUGHT CLOUD ── */
/* The cloud container is absolutely positioned and moved by JS around an ellipse */
.cloud-wrap {
position: absolute;
pointer-events: none;
z-index: 10;
/* width/height set by JS */
}

.cloud-svg {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
overflow: visible;
}

.cloud-text-wrap {
position: relative;
z-index: 2;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
padding: 10px 14px 12px;
}

.cloud-text {
font-family: ‘DM Serif Display’, serif;
font-style: italic;
font-size: 10.5px;
color: var(–text-primary);
text-align: center;
line-height: 1.5;
letter-spacing: 0.01em;
transition: opacity 0.35s ease;
max-width: 120px;
}
.cloud-text.fade { opacity: 0; }

/* Bubble trail dots — also moved by JS */
.trail-dot {
position: absolute;
background: var(–tray);
border: 1px solid var(–border-light);
border-radius: 50%;
z-index: 9;
pointer-events: none;
}

/* ── EDIT ── */
.edit-toggle {
display:flex; align-items:center; justify-content:center; gap:5px;
background:transparent; border:1px solid var(–border-light);
border-radius:7px; padding:7px 12px;
color:var(–text-muted); font-family:‘DM Sans’,sans-serif;
font-size:10px; font-weight:400; letter-spacing:0.06em;
text-transform:uppercase; cursor:pointer; width:100%;
transition:background 0.18s, border-color 0.18s;
pointer-events: all;
-webkit-user-select: none; user-select: none;
}
.edit-toggle:hover { background:#f5f3ef; border-color:var(–border); }
.edit-panel { width:100%; display:none; flex-direction:column; gap:8px; }
.edit-panel.open { display:flex; }
.edit-label { font-size:9px; color:var(–text-light); letter-spacing:0.1em; text-transform:uppercase; }
.thoughts-list { display:flex; flex-direction:column; gap:5px; max-height:150px; overflow-y:auto; }
.thoughts-list::-webkit-scrollbar { width:3px; }
.thoughts-list::-webkit-scrollbar-thumb { background:var(–border); border-radius:3px; }
.thought-item { display:flex; align-items:center; gap:6px; }
.thought-item-text {
flex:1; font-size:11px; color:var(–text-primary); font-weight:300;
padding:5px 8px; background:var(–tray); border:1px solid var(–border-light);
border-radius:6px; font-family:‘DM Sans’,sans-serif; outline:none;
transition:border-color 0.18s;
}
.thought-item-text:focus { border-color:var(–border); }
.del-btn {
background:none; border:none; cursor:pointer; color:var(–text-light);
font-size:15px; line-height:1; padding:2px 4px; border-radius:4px;
transition:color 0.18s; flex-shrink:0;
}
.del-btn:hover { color:#a06060; }
.add-row { display:flex; gap:6px; }
.add-input {
flex:1; font-size:11px; color:var(–text-primary); font-weight:300;
padding:6px 9px; background:var(–surface); border:1px solid var(–border);
border-radius:7px; font-family:‘DM Sans’,sans-serif; outline:none;
transition:border-color 0.18s;
}
.add-input:focus { border-color:var(–text-muted); }
.add-input::placeholder { color:var(–text-light); font-style:italic; }
.add-btn {
background:var(–text-primary); border:none; border-radius:7px;
padding:6px 11px; color:white; font-size:17px; line-height:1;
cursor:pointer; flex-shrink:0; transition:background 0.18s, transform 0.12s;
}
.add-btn:hover { background:var(–hat-light); }
.add-btn:active { transform:scale(0.93); }
.save-row { display:flex; gap:6px; }
.save-btn {
flex:1; background:var(–text-primary); border:none; border-radius:7px;
padding:8px; color:white; font-family:‘DM Sans’,sans-serif;
font-size:10px; font-weight:500; letter-spacing:0.07em;
text-transform:uppercase; cursor:pointer; transition:background 0.18s;
}
.save-btn:hover { background:var(–hat-light); }
.cancel-btn {
flex:1; background:transparent; border:1px solid var(–border);
border-radius:7px; padding:8px; color:var(–text-muted);
font-family:‘DM Sans’,sans-serif; font-size:10px; font-weight:400;
letter-spacing:0.07em; text-transform:uppercase; cursor:pointer;
transition:background 0.18s;
}
.cancel-btn:hover { background:var(–tray); }
.save-status { font-size:9px; color:var(–text-light); font-style:italic; text-align:center; min-height:11px; }

/* ── LIGHTBULB ── */
.lightbulb {
position: absolute;
font-size: 26px;
left: 50%;
/* sits just inside the hat top — scene hat-wrap top is ~50%-46% = ~40px from top */
top: 46%;
transform: translate(-50%, 0) scale(0);
z-index: 20;
pointer-events: none;
transform-origin: bottom center;
filter: drop-shadow(0 0 6px rgba(255,220,80,0.7));
}
@keyframes bulbPop {
0%   { transform: translate(-50%, 0)   scale(0)    rotate(-12deg); opacity: 0; }
30%  { transform: translate(-50%, -48px) scale(1.2) rotate(8deg);  opacity: 1; }
55%  { transform: translate(-50%, -54px) scale(1.0) rotate(-4deg); opacity: 1; }
75%  { transform: translate(-50%, -52px) scale(1.0) rotate(0deg);  opacity: 1; }
88%  { transform: translate(-50%, -52px) scale(1.0) rotate(0deg);  opacity: 1; }
100% { transform: translate(-50%, -80px) scale(0.6) rotate(5deg);  opacity: 0; }
}
.lightbulb.pop {
animation: bulbPop 1.6s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
}

/* glow pulse while editor is open */
@keyframes bulbGlow {
0%,100% { filter: drop-shadow(0 0 4px rgba(255,220,80,0.5)); }
50%     { filter: drop-shadow(0 0 12px rgba(255,220,80,0.9)); }
}
.lightbulb.glow {
transform: translate(-50%, -52px) scale(1.0);
opacity: 1;
animation: bulbGlow 1.8s ease-in-out infinite;
}
</style>

</head>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const STORAGE_KEY    = 'tophat_v4';
const SWAP_INTERVAL  = 15000;  // new thought every 15s
const ORBIT_PERIOD   = 22000;  // full orbit in ms
const CLOUD_W        = 148;
const CLOUD_H        = 80;

// Scene is 204×204. Hat visual center roughly at:
const SCX = 102, SCY = 108;   // orbit center (scene coords)
const ORX  = 82,  ORY = 52;   // orbit radii (wider than tall)

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let thoughts   = [];
let thoughtIdx = 0;
let angle      = -Math.PI / 2;  // start top-center
let rafId      = null;
let lastTs     = null;
let lastSwap   = 0;
let isEditing  = false;
let editDraft  = [];

// ═══════════════════════════════════════
// CLOUD SVG
// ═══════════════════════════════════════
function drawCloudSvg() {
const svg = document.getElementById(‘cloudSvg’);
const w = CLOUD_W, h = CLOUD_H;
svg.setAttribute(‘viewBox’, `0 0 ${w} ${h}`);
svg.setAttribute(‘width’, w);
svg.setAttribute(‘height’, h);

// Define bumps that make a natural cloud blob
const cx = w * 0.5, cy = h * 0.56;
const bumps = [
{ x: cx,           y: cy,          r: h * 0.36 },
{ x: cx - h*0.36,  y: cy + h*0.06, r: h * 0.26 },
{ x: cx + h*0.36,  y: cy + h*0.06, r: h * 0.26 },
{ x: cx - h*0.18,  y: cy - h*0.26, r: h * 0.24 },
{ x: cx + h*0.18,  y: cy - h*0.26, r: h * 0.24 },
{ x: cx - h*0.52,  y: cy + h*0.14, r: h * 0.18 },
{ x: cx + h*0.52,  y: cy + h*0.14, r: h * 0.18 },
];

// Draw fill layer then stroke layer so borders don’t show between bumps
svg.innerHTML =
bumps.map(b => `<circle cx="${b.x.toFixed(1)}" cy="${b.y.toFixed(1)}" r="${b.r.toFixed(1)}" fill="#F0EFED" stroke="none"/>`).join(’’) +
// outer stroke ring — only on outermost edge (render all at once, stroke on top)
bumps.map(b => `<circle cx="${b.x.toFixed(1)}" cy="${b.y.toFixed(1)}" r="${b.r.toFixed(1)}" fill="none" stroke="#dbd7cf" stroke-width="1.1"/>`).join(’’) +
// inner fill-over to hide internal strokes
bumps.map(b => `<circle cx="${b.x.toFixed(1)}" cy="${b.y.toFixed(1)}" r="${(b.r - 0.7).toFixed(1)}" fill="#F0EFED" stroke="none"/>`).join(’’);

const wrap = document.getElementById(‘cloudWrap’);
wrap.style.width  = w + ‘px’;
wrap.style.height = h + ‘px’;
}

// ═══════════════════════════════════════
// ORBIT ANIMATION
// ═══════════════════════════════════════
function frame(ts) {
if (lastTs === null) lastTs = ts;
const dt = Math.min(ts - lastTs, 60);
lastTs = ts;

if (!isEditing) {
// Advance orbit angle
angle += (Math.PI * 2 / ORBIT_PERIOD) * dt;

```
// Check if we should swap thought
lastSwap += dt;
if (lastSwap >= SWAP_INTERVAL) {
  lastSwap = 0;
  swapThought();
}

positionCloud();
```

}

rafId = requestAnimationFrame(frame);
}

function positionCloud() {
const cx = SCX + ORX * Math.cos(angle);
const cy = SCY + ORY * Math.sin(angle);

// Place cloud centered on orbit point
const wrap = document.getElementById(‘cloudWrap’);
wrap.style.left = (cx - CLOUD_W / 2) + ‘px’;
wrap.style.top  = (cy - CLOUD_H / 2) + ‘px’;

// Depth effect: sin(angle) from -1 (back) to +1 (front)
const sinA  = Math.sin(angle);
const depth = (sinA + 1) / 2;
const scale   = 0.78 + depth * 0.22;
const opacity = 0.55 + depth * 0.45;
wrap.style.transform = `scale(${scale.toFixed(3)})`;
wrap.style.opacity   = opacity.toFixed(3);
wrap.style.zIndex    = sinA < 0 ? 1 : 10;

// Trail dots: interpolate between cloud center and hat top
// Hat top roughly at SCX, SCY - 54 (top of hat)
const hatTopX = SCX, hatTopY = SCY - 54;
const steps = [0.72, 0.84, 0.93]; // fraction between cloud → hat
const dotSizes = [10, 7, 5];
steps.forEach((t, i) => {
const dx = cx + (hatTopX - cx) * t;
const dy = cy + (hatTopY - cy) * t;
const dot = document.getElementById(‘dot’ + i);
dot.style.width  = dotSizes[i] + ‘px’;
dot.style.height = dotSizes[i] + ‘px’;
dot.style.left   = (dx - dotSizes[i]/2) + ‘px’;
dot.style.top    = (dy - dotSizes[i]/2) + ‘px’;
dot.style.opacity = opacity.toFixed(3);
dot.style.zIndex  = sinA < 0 ? 1 : 10;
dot.style.transform = `scale(${scale.toFixed(3)})`;
});
}

// ═══════════════════════════════════════
// THOUGHT SWAP
// ═══════════════════════════════════════
function swapThought() {
if (!thoughts.length) return;
thoughtIdx = (thoughtIdx + 1) % thoughts.length;
const textEl = document.getElementById(‘cloudText’);
textEl.classList.add(‘fade’);
setTimeout(() => {
textEl.textContent = thoughts[thoughtIdx];
textEl.classList.remove(‘fade’);
}, 380);
}

function setThought(idx) {
thoughtIdx = idx % thoughts.length;
document.getElementById(‘cloudText’).textContent = thoughts[thoughtIdx];
}

// ═══════════════════════════════════════
// STORAGE — JSONbin
// ═══════════════════════════════════════
const BIN_ID  = ‘69b0e1821687bc351c7c470d’;
const API_KEY = ‘$2a$10$YJRS5A0ezItimuE0YbEK/.Ca1UUhStRrJax.4zYQos3pmVKjwkPWG’;
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

async function loadThoughts() {
const statusEl = document.getElementById(‘dbStatus’);
statusEl.textContent = ‘loading…’;
try {
const r = await fetch(BIN_URL + ‘/latest’, {
headers: { ‘X-Master-Key’: API_KEY }
});
const j = await r.json();
if (j.record && Array.isArray(j.record.thoughts) && j.record.thoughts.length) {
thoughts = j.record.thoughts;
statusEl.textContent = ‘’;
} else {
statusEl.textContent = ‘no thoughts found in db’;
thoughts = [‘add your thoughts via edit ✦’];
}
} catch(e) {
statusEl.textContent = ’db error: ’ + e.message;
thoughts = [‘could not reach db’];
}
setThought(0);
lastSwap = 0;
if (rafId) cancelAnimationFrame(rafId);
lastTs = null;
rafId = requestAnimationFrame(frame);
}

async function saveLocal(list) {
try {
await fetch(BIN_URL, {
method: ‘PUT’,
headers: { ‘Content-Type’: ‘application/json’, ‘X-Master-Key’: API_KEY },
body: JSON.stringify({ thoughts: list })
});
} catch(e) {}
}

// ═══════════════════════════════════════
// EDIT
// ═══════════════════════════════════════
function toggleEdit() { isEditing ? cancelEdit() : openEdit(); }

function openEdit() {
isEditing = true;
editDraft = […thoughts];
document.getElementById(‘editPanel’).classList.add(‘open’);
document.getElementById(‘editToggle’).textContent = ‘✦ close editor’;
renderEditList();
try {
const bulb = document.getElementById(‘lightbulb’);
bulb.classList.remove(‘pop’, ‘glow’);
void bulb.offsetWidth;
bulb.classList.add(‘pop’);
bulb.addEventListener(‘animationend’, () => {
bulb.classList.remove(‘pop’);
bulb.classList.add(‘glow’);
}, { once: true });
} catch(e) {}
}

function cancelEdit() {
isEditing = false;
document.getElementById(‘editPanel’).classList.remove(‘open’);
document.getElementById(‘editToggle’).textContent = ‘✦ edit thoughts’;
document.getElementById(‘saveStatus’).textContent = ‘’;
// dismiss lightbulb
const bulb = document.getElementById(‘lightbulb’);
bulb.classList.remove(‘pop’, ‘glow’);
}

function renderEditList() {
const list = document.getElementById(‘thoughtsList’);
list.innerHTML = ‘’;
editDraft.forEach((t, i) => {
const row = document.createElement(‘div’);
row.className = ‘thought-item’;
const inp = document.createElement(‘input’);
inp.className = ‘thought-item-text’;
inp.value = t; inp.maxLength = 55;
inp.oninput = () => { editDraft[i] = inp.value; };
const del = document.createElement(‘button’);
del.className = ‘del-btn’; del.textContent = ‘×’;
del.onclick = () => { editDraft.splice(i, 1); renderEditList(); };
row.appendChild(inp); row.appendChild(del);
list.appendChild(row);
});
}

function addThought() {
const inp = document.getElementById(‘addInput’);
const val = inp.value.trim();
if (!val) return;
editDraft.push(val);
inp.value = ‘’;
renderEditList();
document.getElementById(‘thoughtsList’).scrollTop = 9999;
}

async function saveThoughts() {
const inputs = document.querySelectorAll(’.thought-item-text’);
editDraft = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
if (!editDraft.length) return;
thoughts = […editDraft];
const s = document.getElementById(‘saveStatus’);
s.textContent = ‘saving…’;
await saveLocal(thoughts);
setThought(0);
lastSwap = 0;
cancelEdit();
s.textContent = ‘saved ✦’;
setTimeout(() => s.textContent = ‘’, 2500);
}

drawCloudSvg();
loadThoughts();
